name: ci

on:
  push:
  pull_request:

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r tests/requirements.txt
      - run: python3 tests/validate_vercel_json.py
      - run: python3 tests/check_entrypoints.py
      - run: python3 tests/check_asset_links.py
      - run: python3 tests/check_no_absolute_paths.py
